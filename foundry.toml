[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']

# Use Solidity version 0.8.20 for security and stability
solc_version = "0.8.20"

# Enable optimizer for gas efficiency
optimizer = true
optimizer_runs = 200

# Fuzz testing configuration
fuzz_runs = 256

# Chain ID for Anvil (default is 31337)
chain_id = 31337